<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        @import url('https://fonts.googleapis.com/css2?family=Englebert&display=swap');
        body{
            background-color: #23272a;
            display: flex;
            flex-direction: row;
        }
        .messages-section{
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 69.5%;
            height: 99%;
            margin-left: 30%;
            border: 4px  solid #1b1c1d;
        }
        .messages-container{
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 85%;
        }
        .message{
            text-align: center;
            width: fit-content;
            height: fit-content;
            padding: 15px;
            padding-left: 70px;
            padding-right: 70px;
            margin-top: 10px;
            border-radius: 10px;
            background-color: #3a3d3f;
            font-size: 20px;
            color: white;
        }
        div{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 10%;
        }
        div > input{
            width: 50%;
            height: 48px;
            border: 4px solid #1b1c1d;
            background-color: #393b3d;
            border-radius: 10px;
            color: white;
            font-family: "Englebert";
            font-size: 18px;
            font-weight: 500;
            padding-left: 15px;
            outline: hidden;
        }
        div > input::selection{
            outline: hidden;
        }
        div > button{
            width: 115px;
            height: 48px;
            border: 3px solid #617cdb;
            background-color: #7289da;
            border-radius: 10px;
            color: white;
            font-family: "Englebert" ;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            margin-left: 5px;
        }
        div > button:hover{
            background-color: #506aca;
             border: 3px solid #506aca;
        }
        .sidebar-section{
            position: absolute;
            width: 30%;
            height: 99%;
            border: 3px  solid #1b1c1d;
        }
    </style>
</head>
<body>
    <div class="sidebar-section"></div>

    <div class="messages-section">
        <div class="messages-container"></div>
        <div>
            <input type="text" id="text-input">
            <button id="click-btn">Send <i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let btn = document.getElementById("click-btn");
        var textInput = document.getElementById("text-input");
        var messageContainer = document.querySelector(".messages-container");
        var username = prompt();
        let messageHistory = [];
        const socket = io();
        btn.onclick = function(event){
        if(textInput.value === ""){
                alert("Please enter the message first!")
        }else{
        socket.emit("chat message", textInput.value, username)
        }
        }


        socket.on("chat message", (msg, username) => {
            while(username == ""){
                var username = prompt("Enter your name before start chatting");
            }
            let message = document.createElement("div");
            messageContainer.appendChild(message)
            message.classList.add("message");
            message.textContent = `${username}: ${msg}`;
            textInput.value = "";
            messageHistory.push(msg)
            console.log(messageHistory)
            if(username === this.username){
                message.style.marginLeft = "750px";
            }else{
                message.style.marginRight = "750px";
            }
        })
    </script>
</body>
</html>
